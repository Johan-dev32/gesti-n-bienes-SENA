<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Formulario de Instructor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar-sena{
background:#39A900;
}

.navbar-brand{
color:white;
font-weight:bold;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card-header{
background:#39A900;
}

.btn-sena{
background:#39A900;
color:white;
border:none;
}

.btn-sena:hover{
background:#2e7d32;
color:white;
}

</style>

</head>

<body>

<nav class="navbar navbar-sena">
<div class="container">
<span class="navbar-brand">SENA | Registro de Instructor</span>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card">

<div class="card-header text-white">

<h3 th:text="${instructor.id != null} ? '✏️ Editar Instructor' : '➕ Nuevo Instructor'"></h3>

</div>

<div class="card-body">

<form th:action="@{/instructor/guardar}" th:object="${instructor}" method="post">

<input type="hidden" th:field="*{id}">

<div class="mb-3">
<label class="form-label">Nombres</label>
<input type="text" class="form-control" th:field="*{nombres}" required>
</div>

<div class="mb-3">
<label class="form-label">Apellidos</label>
<input type="text" class="form-control" th:field="*{apellidos}" required>
</div>

<div class="mb-3">
<label class="form-label">Correo</label>
<input type="email" class="form-control" th:field="*{correo}" required>
</div>

<div class="mb-3">
<label class="form-label">Celular</label>
<input type="text" class="form-control" th:field="*{celular}" required>
</div>

<div class="d-flex justify-content-between">

<a href="/instructor/lista" class="btn btn-secondary">❌ Cancelar</a>

<button type="submit" class="btn btn-sena">💾 Guardar</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
