<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Listado de Instructores</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar-sena{
background:#39A900;
}

.navbar-sena .navbar-brand{
color:white;
font-weight:bold;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn-sena{
background:#39A900;
color:white;
border:none;
}

.btn-sena:hover{
background:#2e7d32;
color:white;
}

.table thead{
background:#39A900;
color:white;
}

</style>
</head>

<body>

<nav class="navbar navbar-sena">
<div class="container">
<span class="navbar-brand">SENA | Gestión de Instructores</span>
</div>
</nav>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h1>👨‍🏫 Listado de Instructores</h1>
<a href="/instructor/formulario" class="btn btn-sena">➕ Nuevo Instructor</a>
</div>

<div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
<span th:text="${mensaje}"></span>
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
<span th:text="${error}"></span>
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="card">
<div class="card-body">

<table class="table table-hover align-middle">

<thead>
<tr>
<th>ID</th>
<th>Nombres</th>
<th>Apellidos</th>
<th>Correo</th>
<th>Celular</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
<tr th:each="instructor : ${instructores}">

<td th:text="${instructor.id}"></td>
<td th:text="${instructor.nombres}"></td>
<td th:text="${instructor.apellidos}"></td>
<td th:text="${instructor.correo}"></td>
<td th:text="${instructor.celular}"></td>

<td>

<a th:href="@{/instructor/detalle/{id}(id=${instructor.id})}"
class="btn btn-sm btn-info">👁️</a>

<a th:href="@{/instructor/formulario/{id}(id=${instructor.id})}"
class="btn btn-sm btn-warning">✏️</a>

<a th:href="@{/instructor/eliminar/{id}(id=${instructor.id})}"
class="btn btn-sm btn-danger"
onclick="return confirm('¿Estás seguro de eliminar este instructor?')">🗑️</a>

</td>

</tr>
</tbody>

</table>

</div>
</div>

<div th:if="${#lists.isEmpty(instructores)}" class="alert alert-info mt-3">
No hay instructores registrados.
</div>

<div class="mt-4 text-center">
<a href="/" class="btn btn-secondary">⬅️ Volver al Inicio</a>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
