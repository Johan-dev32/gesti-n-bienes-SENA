<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Centros de Formación</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}
.navbar-sena{
    background:#39A900;
}
.card{
    border:none;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<nav class="navbar navbar-sena">
<div class="container">
<span class="navbar-brand text-white">SENA | Centros de Formación</span>
</div>
</nav>

<div class="container mt-5">

<div class="row">

<!-- FORMULARIO -->
<div class="col-md-5">

<div class="card p-4">

<h4>Registrar Centro</h4>

<form th:action="@{/guardarCentro}" th:object="${centro}" method="post">

<div class="mb-3">
<label>Nombre:</label>
<input type="text" class="form-control" th:field="*{nombre}" required>
</div>

<div class="mb-3">
<label>Código:</label>
<input type="text" class="form-control" th:field="*{codigo}" required>
</div>

<div class="mb-3">
<label>Regional:</label>
<select class="form-control" th:field="*{regional.id}" required>
    <option value="">Seleccione</option>
    <option th:each="r : ${regionales}" 
            th:value="${r.id}" 
            th:text="${r.nombre}">
    </option>
</select>
</div>

<button class="btn btn-success w-100">Guardar</button>

</form>

</div>

</div>

<!-- TABLA -->
<div class="col-md-7">

<div class="card p-4">

<h4>Lista de Centros</h4>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Código</th>
<th>Regional</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr th:each="c : ${centros}">
<td th:text="${c.id}"></td>
<td th:text="${c.nombre}"></td>
<td th:text="${c.codigo}"></td>
<td th:text="${c.regional.nombre}"></td>

<td>
<a th:href="@{/editar-centro/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Editar</a>
<a th:href="@{/eliminar-centro/{id}(id=${c.id})}" class="btn btn-danger btn-sm">Eliminar</a>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
<div class="mt-4 text-center">
<a href="/" class="btn btn-secondary">⬅️ Volver al Inicio</a>
</div>
</div>

</body>
</html>
