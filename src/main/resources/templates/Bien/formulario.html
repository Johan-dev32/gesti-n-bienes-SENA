<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Formulario de Bien</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar-sena{
background:#39A900;
}

.navbar-brand{
color:white;
font-weight:bold;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card-header{
background:#39A900;
}

.btn-sena{
background:#39A900;
color:white;
border:none;
}

.btn-sena:hover{
background:#2e7d32;
}

</style>

</head>

<body>

<nav class="navbar navbar-sena">
<div class="container">
<span class="navbar-brand">SENA | Registro de Bien</span>
</div>
</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-10">

<div class="card">

<div class="card-header text-white">
<h3 th:text="${bien.id} != null ? '✏️ Editar Bien' : '➕ Nuevo Bien'"></h3>
</div>

<div class="card-body">

<form th:action="@{/bien/guardar}" th:object="${bien}" method="post">

<input type="hidden" th:field="*{id}">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Centro</label>
<select class="form-select" th:field="*{centro}">
    <option value="">-- Seleccione Centro --</option>
    <option th:each="c : ${centros}"
            th:value="${c.id}"
            th:text="${c.nombre}">
    </option>
</select>
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Modelo</label>
<input type="text" class="form-control" th:field="*{modelo}" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Consecutivo</label>
<input type="text" class="form-control" th:field="*{consecutivo}" required>
</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Placa</label>
<input type="text" class="form-control" th:field="*{placa}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Valor</label>
<input type="number" step="0.01" class="form-control" th:field="*{valor}">
</div>

</div>

<div class="mb-3">
<label class="form-label">Descripción</label>
<textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">ElementoDescripción</label>
<input type="text" class="form-control" th:field="*{elementoDescripcion}">
</div>

<div class="mb-3">
<label class="form-label">Atributos</label>
<textarea class="form-control" th:field="*{atributos}" rows="2"></textarea>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Fecha Adquisición</label>
<input type="date" class="form-control" th:field="*{fechaAdquisicion}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Expiración</label>
<input type="date" class="form-control" th:field="*{expiracion}">
</div>

</div>

<div class="mb-3">

<label class="form-label">Instructor Asignado</label>

<select class="form-select" th:field="*{instructor}">

<option value="">-- Sin Instructor --</option>

<option th:each="instructor : ${instructores}"
th:value="${instructor.id}"
th:text="${instructor.nombres + ' ' + instructor.apellidos}">
</option>

</select>

</div>

<div class="d-flex justify-content-between">

<a href="/bien/lista" class="btn btn-secondary">❌ Cancelar</a>

<button type="submit" class="btn btn-sena">💾 Guardar</button>

</div>

</form>

</div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
